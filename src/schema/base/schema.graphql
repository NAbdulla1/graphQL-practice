type Query {
  info: String!
  feed(filterNeedle: String): [Link!]!
  link(id: ID!): Link
  comment(id: ID!): Comment
  me: User
}

directive @url on ARGUMENT_DEFINITION | INPUT_FIELD_DEFINITION

type Mutation {
  postLink(url: String! @url, description: String!): Link!
  postCommentOnLink(linkId: ID!, body: String!): Comment!
  deleteLink(id: ID!): Link

  # MFA Mutations
  generateMfaSecret: MfaSecretResponse!
  enableMfa(code: String!): Boolean!
  disableMfa(code: String!): Boolean!
  verifyMfaLogin(code: String!): Boolean!
}

type MfaSecretResponse {
  secret: String!
  otpauthUrl: String!
  qrCodeDataUrl: String!
}

type Subscription {
  newLink: Link!
  deletedLink: Link!
}

type User {
  id: ID!
  email: String!
  name: String!
  mfaEnabled: Boolean!
  needsMfaVerification: Boolean!
  links: [Link!]!
  comments: [Comment!]!
}

type Link {
  id: ID!
  createdAt: String!
  description: String!
  url: String!
  comments: [Comment!]!
  postedBy: User
}

type Comment {
  id: ID!
  createdAt: String!
  body: String!
  link: Link!
  author: User
}
