type Query {
  info: String!
  feed(filterNeedle: String): [Link!]!
  link(id: ID!): Link
  comment(id: ID!): Comment
}

directive @url on ARGUMENT_DEFINITION | INPUT_FIELD_DEFINITION

type Mutation {
  postLink(url: String! @url, description: String! @constraint(minLength: 1, maxLength: 255)): Link!
  postCommentOnLink(linkId: ID!, body: String! @constraint(minLength: 1, maxLength: 1000)): Comment!
  deleteLink(id: ID!): Link
}

type Subscription {
  newLink: Link!
  deletedLink: Link!
}

type Link {
  id: ID!
  createdAt: String!
  description: String!
  url: String!
  comments: [Comment!]!
}

type Comment {
  id: ID!
  createdAt: String!
  body: String!
  link: Link!
}